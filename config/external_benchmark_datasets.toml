[source]
display_name = "Amai external benchmark dataset catalog"
summary = "Это канонический machine-readable набор внешних benchmark-датасетов для retrieval/vector comparative contour. Каталог нужен, чтобы adapter path жил не на устных командах из чата, а на фиксированном manifest."

[storage]
relative_root = "state/external-benchmarks/datasets"

[datasets.dbpedia_openai_1000k_angular]
order = 1
display_name = "dbpedia-openai-1000k-angular"
aliases = ["dbpedia", "dbpedia-openai"]
family = "hdf5"
distance = "cosine"
dimensions = 1536
local_filename = "dbpedia-openai-1000k-angular.hdf5"
download_url = "https://storage.googleapis.com/ann-datasets/ann-benchmarks/dbpedia-openai-1000k-angular.hdf5"
usage_scope = ["vectordbbench", "ann_benchmarks"]
why_useful = [
  "Хороший общий HDF5 baseline для apples-to-apples retrieval compare.",
  "Подходит как стартовый dataset для adapter-пути и ANN-style external check."
]

