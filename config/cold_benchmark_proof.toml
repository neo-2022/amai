[profile]
display_name = "Local Proof Cold Contour"
summary = "Компактный proof-run на реальных локальных репозиториях этой машины. Нужен для smoke/proof runner-а, а не для финального target verdict."
target_p95_ms = 10.0
target_p99_ms = 15.0
target_max_ms = 20.0
min_precision = 0.99
min_target_hit_rate = 0.99
min_recall = 0.99

[[repos]]
code = "art_local"
display_name = "Art"
repo_root = "../Art"
namespace = "cold_benchmark"
repo_type = "docs_heavy"
size_class = "large_monorepo"
limit_files = 240
skip_embeddings = true
default_retrieval_mode = "local_strict"

[[repos]]
code = "amai_local"
display_name = "Amai"
repo_root = "."
namespace = "cold_benchmark"
repo_type = "code_heavy"
size_class = "medium_production"
limit_files = 200
skip_embeddings = true
default_retrieval_mode = "local_strict"

[[repos]]
code = "langgraph_local"
display_name = "my_langgraph_agent"
repo_root = "../my_langgraph_agent"
namespace = "cold_benchmark"
repo_type = "mixed"
size_class = "medium_repo"
limit_files = 160
skip_embeddings = true
default_retrieval_mode = "local_strict"

[[repos]]
code = "agent_regart_local"
display_name = "agent-RegArt"
repo_root = "../agent-RegArt"
namespace = "cold_benchmark"
repo_type = "mixed"
size_class = "small_repo"
limit_files = 160
skip_embeddings = true
default_retrieval_mode = "local_strict"

[[cases]]
repo_code = "art_local"
query_slice = "architecture_question"
query = "Amai continuity startup"
expected_projects = ["art_local"]
expected_paths = ["scripts/tools/amai_art_continuity_startup.sh", "scripts/tools/README.md"]
expected_terms = ["Amai continuity startup"]

[[cases]]
repo_code = "amai_local"
query_slice = "symbol_lookup"
query = "run_text_compare"
expected_projects = ["amai_local"]
expected_paths = ["src/verify.rs"]
expected_symbols = ["run_text_compare"]
expected_terms = ["run_text_compare"]

[[cases]]
repo_code = "amai_local"
query_slice = "docs_lookup"
query = "Что показывает эта панель"
expected_projects = ["amai_local"]
expected_paths = ["README.md"]
expected_terms = ["Что показывает эта панель"]

[[cases]]
repo_code = "amai_local"
query_slice = "architecture_question"
query = "chat-start restore pack"
expected_projects = ["amai_local"]
expected_paths = ["README.md", "docs/OPERATIONS.md"]
expected_terms = ["chat-start restore pack"]

[[cases]]
repo_code = "amai_local"
query_slice = "config_lookup"
query = "AMI_LOCAL_FAST_CACHE_TTL_MS"
expected_projects = ["amai_local"]
expected_paths = ["src/config.rs", "docs/OPERATIONS.md"]
expected_terms = ["AMI_LOCAL_FAST_CACHE_TTL_MS"]

[[cases]]
repo_code = "amai_local"
query_slice = "cross_file_trace"
query = "Amai human dashboard did not become healthy in time"
expected_paths = ["scripts/human_dashboard.sh"]

[[cases]]
repo_code = "amai_local"
query_slice = "onboarding_query"
query = "has_stack_profile=0"
expected_paths = ["scripts/install_amai.sh"]

[[cases]]
repo_code = "langgraph_local"
query_slice = "docs_lookup"
query = "REGART Art Bridge"
expected_projects = ["langgraph_local"]
expected_paths = ["docs/integration/art_bridge.md"]
expected_terms = ["REGART -> Art Bridge"]

[[cases]]
repo_code = "agent_regart_local"
query_slice = "architecture_question"
query = "логический слой хранения для RAG"
expected_projects = ["agent_regart_local"]
expected_paths = ["docs/vector-store-module.md"]
expected_terms = ["логический слой хранения"]
