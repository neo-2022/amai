[source]
display_name = "Amai external retrieval/vector benchmark layer"
summary = "Это отдельный внешний comparative contour для retrieval/vector слоя. Он не заменяет внутренние hot/cold end-to-end проверки Amai, а дополняет их честным apples-to-apples сравнением."

[benchmarks.vectordbbench]
order = 1
display_name = "VectorDBBench"
aliases = ["vector db bench", "vector-db-benchmark", "vectordb bench"]
benchmark_kind = "general framework + adapter"
summary = "Общий framework для сравнения vector engines на одинаковом железе с одинаковыми dataset/scenario. Для Amai это лучший первый внешний benchmark, потому что он ближе всего к честному apples-to-apples сравнению vector/filter слоя."
reference_url = "https://github.com/zilliztech/VectorDBBench"
upstream_git_url = "https://github.com/zilliztech/VectorDBBench.git"
requires_tools = ["python3", "docker", "git"]
why_relevant = [
  "Даёт общий engine/dataset/scenario контур вместо внутреннего красивого snapshot.",
  "Позволяет сравнить retrieval/vector слой Amai на одинаковом железе и одинаковых нагрузках.",
  "Подходит как основа для следующего слоя: Amai adapter для black-box benchmark."
]
local_role = [
  "Использовать как первый внешний comparative benchmark для vector/filter layer.",
  "Не выдавать его за весь продукт Amai целиком.",
  "Держать рядом с внутренним Amai end-to-end cold/hot contour, а не вместо него."
]
next_step = "Materialize adapter-путь: dataset -> ingest -> warmup -> fixed workload -> latency/QPS/recall report рядом с внутренним Amai cold/hot benchmark."

[benchmarks.ann_benchmarks]
order = 2
display_name = "ann-benchmarks"
aliases = ["ann benchmarks", "ann-benchmark", "ann benchmark"]
benchmark_kind = "ANN core ceiling"
summary = "Классический benchmark для nearest-neighbor ядра с готовыми datasets, Docker-контейнерами и test suite для проверки корректности. Для Amai нужен как отдельный ceiling retrieval-core, чтобы не путать latency orchestration с latency search-ядра."
reference_url = "https://github.com/erikbern/ann-benchmarks"
upstream_git_url = "https://github.com/erikbern/ann-benchmarks.git"
requires_tools = ["python3", "docker", "git"]
why_relevant = [
  "Даёт честный recall/latency tradeoff для search-ядра.",
  "Помогает отделить bottleneck retrieval-core от bottleneck orchestration.",
  "Имеет готовые datasets и test suite integrity."
]
local_role = [
  "Использовать отдельно от whole-product benchmark.",
  "Сравнивать retrieval-core ceiling, а не весь Amai runtime.",
  "Сопоставлять результаты с VectorDBBench и внутренним cold contour."
]
disabled_default_launch_override = "local_qdrant_enable"
next_step = "Построить отдельный Amai retrieval-core evaluation path, чтобы честно сравнивать ceiling search-ядра без примеси orchestration."

[benchmarks.filtered_ann_datasets]
order = 3
display_name = "Filtered ANN benchmark datasets"
aliases = ["filtered ann", "filtered ann datasets", "ann filtering benchmark datasets"]
benchmark_kind = "payload/filter pressure layer"
summary = "Набор dataset-ов для filtered retrieval с payload metadata и готовыми filtering requests. Для Amai этот слой важен, потому что payload/filter path ближе к реальным memory-orchestrator сценариям, чем чистый голый ANN."
reference_url = "https://github.com/qdrant/ann-filtering-benchmark-datasets"
upstream_git_url = "https://github.com/qdrant/ann-filtering-benchmark-datasets.git"
requires_tools = ["git"]
why_relevant = [
  "Давит не только на vector search, но и на payload/filter integration.",
  "Ближе к real-world retrieval, чем чистые nearest-neighbor тесты.",
  "Нужен для честной проверки filtered search слоя рядом с general framework."
]
local_role = [
  "Использовать как третий внешний слой после general framework и ANN core.",
  "Проверять payload/filter поведение, а не подменять им весь продукт.",
  "Сопоставлять с внутренними Amai cases по filtered retrieval и quality."
]
next_step = "Подготовить Amai comparative contour для filtered search: payload-aware datasets + recall/precision + latency рядом с внутренним cold benchmark."

[benchmarks.longmemeval]
order = 4
display_name = "LongMemEval"
aliases = ["longmem-eval", "longmem eval"]
benchmark_kind = "memory"
summary = "Long-term memory benchmark для chat-историй с тестом information extraction, multi-session reasoning, temporal reasoning, knowledge updates и abstention."
reference_url = "https://github.com/xiaowu0162/LongMemEval"
upstream_git_url = "https://github.com/xiaowu0162/LongMemEval.git"
requires_tools = ["git"]
why_relevant = [
  "Проверяет temporal reasoning и knowledge updates, а не только retrieval точность.",
  "Содержит explicit abstention случаи, полезно для truth/accuracy пакета.",
  "Даёт baseline для multi-session memory качества."
]
local_role = [
  "Использовать как обязательный внешний memory benchmark для Stage 3 качества.",
  "Сопоставлять с внутренним accuracy/isolation и continuity восстановлением.",
  "Не смешивать с online-window метриками."
]
next_step = "Материализовать Rust-native runner для генерации ответов Amai + сохранить jsonl output, затем оценить через upstream scoring."

[benchmarks.ama_bench]
order = 5
display_name = "AMA-Bench"
aliases = ["ama-bench", "ama bench"]
benchmark_kind = "memory_agent"
summary = "Long-horizon agent memory benchmark для траекторий агента (действия, инструменты, состояния среды), с акцентом на causality."
reference_url = "https://arxiv.org/abs/2602.22769"
upstream_git_url = "https://huggingface.co/datasets/AMA-bench/AMA-bench"
requires_tools = ["git"]
why_relevant = [
  "Тестирует память именно агента, а не только диалог.",
  "Чувствителен к причинно-следственным связям и stateful trajectory.",
  "Дополняет retrieval-only оценки реальным agentic контекстом."
]
local_role = [
  "Использовать как внешний benchmark для agent-memory слоя.",
  "Проверять не только retrieval, но и causality/trajectory consistency."
]
next_step = "Найти/материализовать официальный runner (или написать Rust-адаптер к schema), затем добавить честный evaluator."

[benchmarks.memoryagentbench]
order = 6
display_name = "MemoryAgentBench"
aliases = ["memoryagent bench", "memory-agent-bench"]
benchmark_kind = "memory"
summary = "Benchmark memory agents по accurate retrieval, test-time learning, long-range understanding и conflict resolution."
reference_url = "https://openreview.net/pdf?id=DT7JyQC3MR"
upstream_git_url = "https://huggingface.co/datasets/ai-hyz/MemoryAgentBench"
requires_tools = ["git"]
why_relevant = [
  "Разделяет retrieval от test-time learning и long-range understanding.",
  "Имеет отдельный конфликтный контур, чувствительный к fidelity памяти.",
  "Полезен для сравнения с competitive memory agents."
]
local_role = [
  "Использовать как внешний quality benchmark памяти.",
  "Сопоставлять результаты с internal accuracy/isolation checks."
]
next_step = "Материализовать Rust-адаптер чтения parquet и генерации Amai output + upstream scoring."

[benchmarks.locomo]
order = 7
display_name = "LoCoMo"
aliases = ["locomo", "long conversational memory"]
benchmark_kind = "memory"
summary = "Very long-term conversational memory benchmark с temporal/causal динамикой."
reference_url = "https://github.com/snap-research/locomo"
upstream_git_url = "https://github.com/snap-research/locomo.git"
requires_tools = ["python3", "git"]
why_relevant = [
  "Очень длинные диалоги с вопросами и event-summarization.",
  "Сильный тест на temporal/causal памяти и устойчивый контекст.",
  "Полезен для RAG-style memory evaluation."
]
local_role = [
  "Использовать как long-horizon conversational benchmark.",
  "Сравнивать с internal memory-task matrix."
]
next_step = "Добавить Rust-адаптер к locomo10.json и evaluator для QA."
