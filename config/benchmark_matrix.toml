[source]
display_name = "philschmid/ai-agent-benchmark-compendium"
url = "https://github.com/philschmid/ai-agent-benchmark-compendium"

[families.function_calling_tool_use]
order = 1
display_name = "Function Calling & Tool Use"
why_it_matters = "Это семейство нужно нам не ради общего слова \"tools\", а для проверки, насколько Amai выдерживает MCP, многошаговый tool selection, policy-gated tool use и работу с несколькими tool-источниками без путаницы."

[families.general_assistant_reasoning]
order = 2
display_name = "General Assistant & Reasoning"
why_it_matters = "Эти эталоны важны, потому что Amai должен не только хранить память, но и поднимать правильный рабочий контекст, не врать на continuity-вопросах и не ломаться на сложных естественных запросах."

[families.coding_software_engineering]
order = 3
display_name = "Coding & Software Engineering"
why_it_matters = "Это семейство показывает, выдерживает ли Amai реальную инженерную работу: continuity в кодовой базе, multi-file retrieval, bugfix context, code editing support и длинные рабочие линии без потери смысла."

[families.computer_interaction]
order = 4
display_name = "Computer Interaction"
why_it_matters = "Это следующий внешний слой для задач, где agent должен держать в памяти ход GUI и web-взаимодействия, а Amai — не терять шаги, состояние и policy-контур при длинной навигации."

[benchmarks.bfcl]
order = 1
display_name = "BFCL"
aliases = ["bfcl", "berkeley function calling leaderboard"]
family = "function_calling_tool_use"
coverage_level = "mapped"
summary = "Эталон для tool use и function calling в serial, parallel и multi-turn сценариях. Для Amai это полезно как reference для строгого multi-step tool contour, а не как прямой runtime replacement."
reference_url = "https://github.com/philschmid/ai-agent-benchmark-compendium"
why_relevant = [
  "Нужен как reference для multi-turn tool choice и stateful reasoning.",
  "Полезен для проверки, не ломается ли Amai на многошаговом tool-routing вокруг continuity и context retrieval."
]
amai_focus = [
  "MCP tool selection",
  "stateful multi-step retrieval",
  "multi-turn continuity without context drift"
]
current_coverage = [
  "Есть живой MCP contour и proof_mcp.sh.",
  "Есть hostile continuity/temporal lookup и fail-closed поведение.",
  "Есть multi-agent scope isolation через Amai working-state."
]
current_gaps = [
  "Нет отдельного BFCL-style harness с task-level scoring.",
  "Нет unified pass-rate отчёта по serial, parallel и multi-turn tool tasks."
]
proof_commands = [
  "./scripts/proof_mcp.sh",
  "./scripts/proof_hostile.sh"
]
next_step = "Собрать Rust-first tool-use eval set с serial, parallel и multi-turn MCP tasks поверх Amai."

