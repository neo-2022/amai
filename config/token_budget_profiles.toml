[profiles.local_default]
display_name = "Обычная рабочая машина"
description = "Подходит, когда внешний клиент сам не публикует жёсткое окно лимита. Показывает текущую рабочую сессию, последние 24 часа и накопительный итог."
session_gap_minutes = 30
rolling_window_hours = 24

[profiles.codex_5h]
display_name = "Codex 5 часов"
description = "Показывает токены за текущую рабочую сессию, за текущее 5-часовое окно и за всё время. Полезно, когда вы смотрите именно на лимитное окно Codex."
session_gap_minutes = 30
rolling_window_hours = 5

[profiles.demo_1h]
display_name = "Быстрый demo-час"
description = "Показывает короткое часовое окно для демонстраций, smoke-прогонов и недолгих проверок."
session_gap_minutes = 15
rolling_window_hours = 1
