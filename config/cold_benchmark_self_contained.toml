[profile]
display_name = "Self-Contained Proof Cold Contour"
summary = "Repo-local cold benchmark contour без внешнего corpus: только Amai, только self-contained fixture tier. Нужен для reproducibility и clean-machine proof, но не для canonical dashboard snapshot."
target_p50_ms = 5.0
target_p95_ms = 20.0
target_p99_ms = 40.0
target_max_ms = 60.0
min_precision = 0.997
min_target_hit_rate = 0.997
min_recall = 0.997
min_sample_count = 8
min_repo_count = 1
min_query_slice_count = 8
max_duration_seconds = 60.0
max_leakage = 0
max_error_rate = 0.0

[[repos]]
code = "amai"
display_name = "Amai"
repo_root = "."
namespace = "cold_benchmark_self_contained"
repo_type = "code_heavy"
size_class = "compact_fixture_tier"
limit_files = 120
skip_embeddings = true
default_retrieval_mode = "local_strict"

[[cases]]
repo_code = "amai"
query_slice = "docs_lookup"
query = "docs/AGENT_START_HERE.md"
description = "Agent entry doc must be retrievable by exact path inside the repo-local self-contained contour."
expected_projects = ["amai"]
expected_paths = ["docs/AGENT_START_HERE.md"]
limit_documents = 1
limit_symbols = 0
limit_chunks = 0
limit_semantic_chunks = 0

