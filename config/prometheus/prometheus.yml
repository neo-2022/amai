global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/rules/alerts.yml

scrape_configs:
  - job_name: amai
    metrics_path: /metrics
    static_configs:
      - targets:
          - __AMI_PROMETHEUS_SCRAPE_TARGET__

  - job_name: qdrant
    metrics_path: /metrics
    static_configs:
      - targets:
          - __AMI_QDRANT_SCRAPE_TARGET__

  - job_name: prometheus
    static_configs:
      - targets:
          - 127.0.0.1:9090
