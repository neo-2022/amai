[auto_detection]
fallback_client = "vscode"

[clients.vscode]
display_name = "VS Code"
default_output = "${repo_root}/.vscode/mcp.json"
install_scope = "workspace_local"
priority = 100
detect_env_vars = ["VSCODE_IPC_HOOK_CLI"]
detect_workspace_markers = [".vscode"]
detect_home_markers = [".config/Code", ".config/Code/User"]

[clients.vscode.startup_instructions]
mode = "managed_workspace_file"
default_output = "${repo_root}/.github/instructions/amai-continuity-startup.instructions.md"
install_scope = "workspace_local"
format = "vscode_instructions_md"

[clients.cursor]
display_name = "Cursor"
default_output = "${home}/.cursor/mcp.json"
install_scope = "user_global"
priority = 90
detect_env_vars = ["CURSOR_TRACE_ID"]
detect_workspace_markers = [".cursor"]
detect_home_markers = [".cursor"]

[clients.cursor.startup_instructions]
mode = "managed_workspace_file"
default_output = "${repo_root}/.cursor/rules/amai-continuity-startup.mdc"
install_scope = "workspace_local"
format = "cursor_rules_mdc"

[clients.claude-code]
display_name = "Claude Code"
default_output = "${repo_root}/.mcp.json"
install_scope = "workspace_local"
priority = 70
detect_env_vars = ["CLAUDECODE"]
detect_workspace_markers = [".mcp.json"]
detect_home_markers = []

[clients.claude-code.startup_instructions]
mode = "managed_append_block"
default_output = "${repo_root}/CLAUDE.md"
install_scope = "workspace_local"
format = "generic_markdown"

[clients.codex]
display_name = "Codex"
default_output = "${home}/.codex/config.toml"
install_scope = "user_global"
priority = 80
detect_env_vars = ["CODEX_HOME"]
detect_workspace_markers = []
detect_home_markers = [".codex", ".codex/config.toml"]

[clients.codex.startup_instructions]
mode = "managed_append_block"
default_output = "${repo_root}/AGENTS.md"
install_scope = "workspace_local"
format = "codex_agents_snippet"

[clients.hermes]
display_name = "Hermes"
default_output = "${home}/.hermes/config.yaml"
install_scope = "user_global"
priority = 75
detect_env_vars = ["HERMES_HOME"]
detect_workspace_markers = []
detect_home_markers = [".hermes", ".hermes/config.yaml"]

[clients.hermes.startup_instructions]
mode = "managed_workspace_file"
default_output = "${repo_root}/.hermes.md"
install_scope = "workspace_local"
format = "hermes_compact_markdown"

[clients.openclaw]
display_name = "OpenClaw"
default_output = "${home}/.openclaw/openclaw.json"
install_scope = "user_global"
priority = 72
detect_env_vars = ["OPENCLAW_CONFIG_PATH", "OPENCLAW_STATE_DIR"]
detect_workspace_markers = []
detect_home_markers = [".openclaw", ".openclaw/openclaw.json"]

[clients.openclaw.startup_instructions]
mode = "managed_workspace_file"
default_output = "${repo_root}/.openclaw/AGENTS.md"
install_scope = "workspace_local"
format = "generic_markdown"

[clients.claude-desktop]
display_name = "Claude Desktop"
default_output = "${repo_root}/tmp/onboarding/claude-desktop-mcp.json"
install_scope = "manual_generated"
priority = 20
detect_env_vars = []
detect_workspace_markers = []
detect_home_markers = []

[clients.claude-desktop.startup_instructions]
mode = "manual_snippet_only"
default_output = "${repo_root}/tmp/onboarding/claude-desktop-amai-startup.md"
install_scope = "manual_generated"
format = "generic_markdown"

[clients.generic]
display_name = "Generic"
default_output = "${repo_root}/tmp/onboarding/generic-mcp.json"
install_scope = "manual_generated"
priority = 10
detect_env_vars = []
detect_workspace_markers = []
detect_home_markers = []

[clients.generic.startup_instructions]
mode = "manual_snippet_only"
default_output = "${repo_root}/tmp/onboarding/generic-amai-startup.md"
install_scope = "manual_generated"
format = "generic_markdown"
