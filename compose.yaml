services:
  postgres:
    image: postgres:16
    container_name: ami-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${AMI_PG_DB}
      POSTGRES_USER: ${AMI_PG_USER}
      POSTGRES_PASSWORD: ${AMI_PG_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${AMI_PG_PORT}:5432"
    volumes:
      - ./state/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AMI_PG_USER} -d ${AMI_PG_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  qdrant:
    image: qdrant/qdrant:v1.17.0
    container_name: ami-qdrant
    restart: unless-stopped
    ports:
      - "56333:6333"
      - "56334:6334"
    volumes:
      - ./state/qdrant:/qdrant/storage

  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    container_name: ami-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AMI_S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${AMI_S3_SECRET_KEY}
    ports:
      - "59000:9000"
      - "59001:9001"
    volumes:
      - ./state/minio:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20

  nats:
    image: nats:2.11.4
    container_name: ami-nats
    restart: unless-stopped
    command: ["-c", "/etc/nats/server.conf"]
    ports:
      - "54222:4222"
      - "58222:8222"
    volumes:
      - ./config/nats/server.conf:/etc/nats/server.conf:ro
      - ./state/nats:/data/jetstream
