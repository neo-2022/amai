name: repo-hygiene

on:
  push:
  pull_request:

jobs:
  repo-hygiene:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build debug binary
        run: cargo build --locked

      - name: Run repo hygiene guard
        run: ./scripts/repo_hygiene_guard.sh --json

      - name: Verify offline no-run build path
        run: ./scripts/proof_offline_no_run_build.sh
